# ASUS Samba (smbd/nmbd) for GT-BE98. samba_multicall is a self-contained
# multicall binary (only glibc deps — no ASUS lib closure); smbd/nmbd/smbpasswd
# are symlinks to it. Upstream samba4 can't be built with the gcc-10.3 toolchain
# (cmocka needs GCC 11+), so use the prebuilt ASUS blob.
package:      gt-be98-samba
version:      "1.0"
description:  ASUS Samba server (smbd/nmbd via samba_multicall) for GT-BE98
license:      PROPRIETARY
redistribute: false

source_paths:
  - vendor/asuswrt-merlin.ng/release/src-rt-5.04behnd.4916/targets/96813GW/fs.install/usr/sbin/samba_multicall
  - vendor/asuswrt-merlin.ng/release/src-rt-5.04behnd.4916/targets/96813GW/fs.install/usr/sbin/smbd
  - vendor/asuswrt-merlin.ng/release/src-rt-5.04behnd.4916/targets/96813GW/fs.install/usr/sbin/nmbd
  - vendor/asuswrt-merlin.ng/release/src-rt-5.04behnd.4916/targets/96813GW/fs.install/usr/sbin/smbpasswd
  - vendor/asuswrt-merlin.ng/release/src-rt-5.04behnd.4916/targets/96813GW/fs.install/sbin/write_smb_conf

release_tag: samba-1.0
