# The complete, FINAL ASUS GT-BE98 root filesystem image (merlin's built
# rootfs.img: a v4 xz squashfs, all-root). This is the exact rootfs the stock/
# merlin firmware flashes and boots — the full proprietary userspace (rc/cfg_server
# engine, wl/dhd, hostapd, /www) AFTER merlin's buildFS post-processing (lib
# flattening, mount dirs, dev nodes). Buildroot bundles it verbatim into the
# .pkgtb so the flashed image is content-identical to a working merlin build
# (network + SSH restored from persistent nvram + /jffs). The proprietary engine
# can't be rebuilt from source; raw fs.install isn't equivalent (pre-processing).
package:      gt-be98-rootfs
version:      "1.0"
description:  Final ASUS GT-BE98 rootfs.img (built squashfs, content-identical to merlin) for the working-firmware build
license:      PROPRIETARY
redistribute: false

source_paths:
