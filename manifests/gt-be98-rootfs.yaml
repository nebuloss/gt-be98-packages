# The complete, FINAL ASUS GT-BE98 root filesystem image (a v4 xz squashfs,
# 128K blocks, all-root): the full proprietary userspace AFTER merlin's buildFS
# post-processing. Buildroot bundles it (after the in-repo transform) into the
# .pkgtb. The proprietary engine can't be rebuilt from source.
#
# Version 0034: the Phase-2b blob set, built from scratch (./build.sh clean,
# 2026-06-06) carrying patches 0024-0031 + 0033 + 0034 (0032 deliberately
# EXCLUDED — banned envrams-wrapper design) on pinned upstream
# ad42d5e81a53bc20e6d583f1b8e1748d09f964c8. Sourced from
# gt-be98-firmware/artifacts-0034/rootfs.img, byte-identical to the squashfs
# embedded in artifacts-0034/GT-BE98_3006_102.6_0_nand_squashfs.pkgtb (sha256
# 1711c65e3f8627791104007ef2aa9303620ea23b2e6b2ace8173dd4639667825 — verified
# via dumpimage FIT hash). Embedded rootfs sha256:
# 76d4ad9e307383a323ce3f01f0e0d7ba83023bd01ecfb3c25d68e456926935cf.
#
# NOTE: the gtbe98_httpd (0033) and gtbe98_sched_daemon (0034) gates are
# default-OFF in this blob — the stock :80 web UI does NOT start. Intended
# input for the buildroot transform once the open webui owns the UI (P2-5/P2-6).
#
# Repackage:
#   scripts/package-blob.sh <this manifest> ../gt-be98-firmware
