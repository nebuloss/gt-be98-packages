# The complete, FINAL ASUS GT-BE98 root filesystem image (a v4 xz squashfs,
# 128K blocks, all-root): the full proprietary userspace (rc/cfg_server engine,
# wl/dhd, hostapd, /www) AFTER merlin's buildFS post-processing (lib flattening,
# mount dirs, dev nodes). Buildroot bundles it verbatim into the .pkgtb so the
# flashed image is content-identical to a working merlin build (network + SSH
# restored from persistent nvram + /jffs). The proprietary engine can't be
# rebuilt from source; raw fs.install isn't equivalent (pre-processing).
#
# Version 0031: extracted from the VALIDATED artifact
# gt-be98-firmware/artifacts-0031/GT-BE98_3006_102.6_0_nand_squashfs.pkgtb
# (sha256 a7dcd0c14669eb363be775fc208f1f73098226723e420a3e3408095b1e98fa01 — the
# image flashed and running on the device, patches 0001-0031), NOT from a loose
# vendor-tree rootfs.img (which drifts as later patches are built). Embedded
# rootfs sha256: dfbf98b4d3a474887ad029e9e6347da081f013e615a607f4f083bb2f3ab28d2c.
#
# Repackage:
#   scripts/extract-pkgtb.sh ../gt-be98-firmware/artifacts-0031/GT-BE98_3006_102.6_0_nand_squashfs.pkgtb /tmp/pkgtb-0031/artifacts-0031
#   scripts/package-blob.sh manifests/gt-be98-rootfs.yaml /tmp/pkgtb-0031
